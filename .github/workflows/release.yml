name: Release

# When a semver tag like v1.2.3 is pushed, move the matching major tag (v1) to
# the same commit so consumers pinning @v1 get the release. The v*.*.* filter
# means the major tag push itself does not retrigger this workflow.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move major version tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          major="${tag%%.*}"
          echo "Pointing ${major} at ${tag} (${GITHUB_SHA})"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${major}" "${tag}"
          git push origin "refs/tags/${major}" --force
