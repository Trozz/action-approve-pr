name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint workflow files
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_level: error

      - name: Validate action.yml structure
        run: |
          python3 - <<'PY'
          import sys, yaml
          with open("action.yml") as f:
              doc = yaml.safe_load(f)
          required = ["name", "description", "inputs", "runs"]
          missing = [k for k in required if k not in doc]
          if missing:
              sys.exit(f"action.yml missing keys: {', '.join(missing)}")
          if doc["runs"].get("using") != "composite":
              sys.exit("action.yml runs.using must be 'composite'")
          for name in ["approvers", "label"]:
              if name not in doc["inputs"]:
                  sys.exit(f"action.yml missing input: {name}")
          print("action.yml structure OK")
          PY

      - name: Syntax-check embedded github-script
        run: node .github/scripts/check-embedded-script.js action.yml
