name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # release-please creates the vX.Y.Z tag with GITHUB_TOKEN, which does not
      # trigger the tag-push release.yml workflow. So move the major tag here,
      # in the same run, whenever a release was actually cut.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0

      - name: Move major version tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
          MAJOR: v${{ steps.release.outputs.major }}
        run: |
          set -euo pipefail
          echo "Pointing ${MAJOR} at ${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${MAJOR}" "${TAG}"
          git push origin "refs/tags/${MAJOR}" --force
