name: Approve PR via reaction
description: >-
  Gate a job on an approving reaction from listed approvers (users or org
  teams), keyed to the PR head commit SHA.

branding:
  icon: check-circle
  color: green

inputs:
  approvers:
    description: >-
      Comma or whitespace separated approvers allowed to approve. Each entry is
      a GitHub username or an org team as org/slug (a leading @ is optional).
      Team members are resolved via the API, which requires the token to have
      read:org scope.
    required: true
  label:
    description: >-
      Optional identifier for what is being approved. Shown in the comment and
      used (with the commit SHA) to key the approval comment. Set distinct
      labels when running more than one approval gate on the same PR so their
      comments do not collide.
    required: false
    default: ""
  message:
    description: Optional free text shown near the top of the approval comment.
    required: false
    default: ""
  approve-reaction:
    description: >-
      Reaction that counts as approval. One of: +1, -1, laugh, confused, heart,
      hooray, rocket, eyes.
    required: false
    default: "+1"
  reject-reaction:
    description: >-
      Reaction that counts as rejection. One of: +1, -1, laugh, confused, heart,
      hooray, rocket, eyes. Must differ from approve-reaction.
    required: false
    default: "-1"
  min-approvals:
    description: Minimum number of distinct approver approval reactions required.
    required: false
    default: "1"
  timeout-minutes:
    description: Minutes to wait for an approval reaction before failing.
    required: false
    default: "5"
  poll-seconds:
    description: How often to poll the approval comment for reactions.
    required: false
    default: "30"
  token:
    description: >-
      GitHub token used to comment and read reactions. Resolving org team
      members requires a token with read:org scope (a PAT or a GitHub App
      installation token, e.g. from actions/create-github-app-token); the
      default GITHUB_TOKEN cannot read team membership.
    required: false
    default: ${{ github.token }}

outputs:
  approved-by:
    description: Comma separated logins of the approvers who approved (empty if not approved).
    value: ${{ steps.approval.outputs.approved-by }}

runs:
  using: composite
  steps:
    - name: Request approval via PR reaction
      id: approval
      uses: actions/github-script@v7
      env:
        APPROVERS: ${{ inputs.approvers }}
        LABEL: ${{ inputs.label }}
        MESSAGE: ${{ inputs.message }}
        APPROVE_REACTION: ${{ inputs.approve-reaction }}
        REJECT_REACTION: ${{ inputs.reject-reaction }}
        MIN_APPROVALS: ${{ inputs.min-approvals }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        POLL_SECONDS: ${{ inputs.poll-seconds }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          if (!context.payload.pull_request) {
            core.setFailed('approve-pr must run on a pull_request event.');
            return;
          }
          const {owner, repo} = context.repo;
          const issue_number = context.issue.number;
          const sha = context.payload.pull_request.head.sha;
          const shortSha = sha.substring(0, 7);

          const ALLOWED_REACTIONS = ['+1', '-1', 'laugh', 'confused', 'heart', 'hooray', 'rocket', 'eyes'];
          const approveReaction = (process.env.APPROVE_REACTION || '+1').trim();
          const rejectReaction = (process.env.REJECT_REACTION || '-1').trim();
          for (const [name, value] of [['approve-reaction', approveReaction], ['reject-reaction', rejectReaction]]) {
            if (!ALLOWED_REACTIONS.includes(value)) {
              core.setFailed(`Invalid ${name} '${value}'. Must be one of: ${ALLOWED_REACTIONS.join(', ')}.`);
              return;
            }
          }
          if (approveReaction === rejectReaction) {
            core.setFailed(`approve-reaction and reject-reaction must differ (both are '${approveReaction}').`);
            return;
          }

          const minApprovals = parseInt(process.env.MIN_APPROVALS || '1', 10);
          const label = process.env.LABEL;
          const message = process.env.MESSAGE || '';
          const timeoutMin = parseInt(process.env.TIMEOUT_MINUTES || '5', 10);
          const pollMs = parseInt(process.env.POLL_SECONDS || '30', 10) * 1000;

          // Parse approvers into explicit users and team references. Anything
          // containing a slash is an org team (org/slug); everything else is a
          // username. A leading @ is optional and stripped.
          const entries = (process.env.APPROVERS || '')
            .split(/[\s,]+/).map(s => s.trim().replace(/^@/, '')).filter(Boolean);
          const userEntries = [];
          const teamEntries = [];
          for (const e of entries) {
            if (e.includes('/')) {
              const idx = e.indexOf('/');
              teamEntries.push({org: e.slice(0, idx), slug: e.slice(idx + 1), ref: e});
            } else {
              userEntries.push(e.toLowerCase());
            }
          }

          // Build the flat allow-list of logins plus a membership map
          // login -> set of source labels ('direct' for a listed user, or the
          // team ref for each listed team the login belongs to). The map drives
          // attribution in the status line.
          const allowed = new Set();
          const membership = new Map();
          const addSource = (login, source) => {
            const key = login.toLowerCase();
            allowed.add(key);
            if (!membership.has(key)) membership.set(key, new Set());
            membership.get(key).add(source);
          };
          for (const u of userEntries) addSource(u, 'direct');
          for (const t of teamEntries) {
            let members;
            try {
              members = await github.paginate(github.rest.teams.listMembersInOrg,
                {org: t.org, team_slug: t.slug, per_page: 100});
            } catch (err) {
              core.setFailed(`Could not read members of team '${t.ref}' (${err.status || err.message}). ` +
                `Teams require a token with read:org scope (a PAT or GitHub App installation token); ` +
                `the default GITHUB_TOKEN cannot read team membership. Also verify the team exists.`);
              return;
            }
            for (const m of members) addSource(m.login, t.ref);
          }

          if (allowed.size === 0) {
            core.setFailed('No approvers resolved from the approvers input.');
            return;
          }

          // Render a login with its source(s): @alice, @alice (org/platform),
          // or @alice (direct, org/platform) when listed both ways.
          const attribute = (login) => {
            const sources = membership.get(login.toLowerCase());
            if (!sources || (sources.size === 1 && sources.has('direct'))) return '@' + login;
            const labels = [...sources].sort((a, b) =>
              a === 'direct' ? -1 : b === 'direct' ? 1 : a.localeCompare(b));
            return `@${login} (${labels.join(', ')})`;
          };

          // Marker is bound to the PR head SHA so an approval applies to a
          // specific commit. A new push produces a new marker (a new comment
          // with no reactions), so a reaction left on an earlier commit cannot
          // approve new code. Re-running the same commit reuses its comment.
          const marker = `<!-- approve-pr:${label}:${sha} -->`;

          // Teams are not expanded here; member lists can be large and noisy.
          const requiredFrom = [
            ...userEntries.map(u => '@' + u),
            ...teamEntries.map(t => `@${t.ref} (team)`),
          ].join(', ');

          const render = (status) => [
            marker,
            label ? `### Approval required: \`${label}\`` : `### Approval required`,
            ...(message ? ['', message] : []),
            ``,
            `Commit: \`${shortSha}\``,
            `React with :${approveReaction}: to approve or :${rejectReaction}: to reject.`,
            `Need ${minApprovals} approval(s) from: ${requiredFrom}`,
            ``,
            `---`,
            `**Status:** ${status}`,
          ].join('\n');

          const comments = await github.paginate(github.rest.issues.listComments,
            {owner, repo, issue_number, per_page: 100});
          let comment = comments.find(c => c.body && c.body.includes(marker));
          const setStatus = async (status) => {
            if (comment) {
              await github.rest.issues.updateComment({owner, repo, comment_id: comment.id, body: render(status)});
            } else {
              ({data: comment} = await github.rest.issues.createComment({owner, repo, issue_number, body: render(status)}));
            }
          };

          await setStatus(`Waiting for approval (timeout ${timeoutMin}m).`);
          core.info(`Awaiting reactions on comment ${comment.id}`);

          const deadline = Date.now() + timeoutMin * 60000;
          while (Date.now() < deadline) {
            const reactions = await github.paginate(github.rest.reactions.listForIssueComment,
              {owner, repo, comment_id: comment.id, per_page: 100});
            const byApprover = reactions.filter(r => allowed.has((r.user?.login || '').toLowerCase()));
            const rejected = byApprover.find(r => r.content === rejectReaction);
            if (rejected) {
              await setStatus(`Rejected by ${attribute(rejected.user.login)} for \`${shortSha}\` at ${new Date().toISOString()}.`);
              core.setOutput('approved-by', '');
              core.setFailed(`Rejected by @${rejected.user.login}`);
              return;
            }
            const approved = [...new Set(byApprover
              .filter(r => r.content === approveReaction)
              .map(r => r.user.login.toLowerCase()))];
            if (approved.length >= minApprovals) {
              const who = approved.map(a => attribute(a)).join(', ');
              await setStatus(`Approved by ${who} for \`${shortSha}\` at ${new Date().toISOString()}.`);
              core.setOutput('approved-by', approved.join(','));
              core.info(`Approved by: ${who}`);
              return;
            }
            await new Promise(r => setTimeout(r, pollMs));
          }
          await setStatus(`Timed out after ${timeoutMin} minutes with insufficient approvals.`);
          core.setOutput('approved-by', '');
          core.setFailed(`Approval timed out after ${timeoutMin} minutes`);
